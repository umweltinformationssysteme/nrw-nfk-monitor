name: Aktualisiere nFK Karte täglich

on:
  schedule:
    # Führt das Skript täglich um 05:00 UTC (ca. 06:00 oder 07:00 Uhr deutscher Zeit) aus
    - cron: '0 5 * * *'
  workflow_dispatch: # Erlaubt es dir, den Prozess jederzeit manuell bei GitHub anzustoßen

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, damit die Action das GIF ins Repo pushen darf

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: GIF generieren
      run: python generate_gif.py

    - name: GIF committen und ins Repository pushen
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add nrw_nfk_timeseries.gif
        # Nur committen, wenn sich das GIF tatsächlich verändert hat
        git diff-index --quiet HEAD || git commit -m "Automatische Aktualisierung der nFK-Zeitreihe"
        git push
