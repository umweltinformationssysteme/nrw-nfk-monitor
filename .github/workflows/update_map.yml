name: Update NRW nFK Map

on:
  schedule:
    - cron: '0 6 * * *' # Täglich um 06:00 UTC
  workflow_dispatch: # Erlaubt es dir, die Action manuell zu starten

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install xarray rioxarray geopandas matplotlib pillow netcdf4 toolz

      - name: GIF generieren
        run: python generate_gif.py

      - name: Änderungen committen und pushen
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add nrw_nfk_timeseries.gif
          # Pusht das GIF nur hoch, wenn es sich zum Vortag verändert hat
          git diff --quiet && git diff --staged --quiet || (git commit -m "Tagesaktuelles nFK GIF aktualisiert" && git push)
